# Zephyr based EC FW project configuration

# Copyright (C) 2023 Advanced Micro Devices, Inc. All rights reserved.


# Logs enabled by default in development, this is overridden in build system
# to ensure releases are correctly generated
CONFIG_LOG=n
# [spike] LOG_* tunables only have meaning when LOG=y; drop to avoid 3.7.1 strict Kconfig
# CONFIG_LOG_MODE_IMMEDIATE=n
# CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=1200
# CONFIG_LOG_BLOCK_IN_THREAD=n
# CONFIG_LOG_BLOCK_IN_THREAD_TIMEOUT_MS=10

# Support for Zephyr RTOS awareness
CONFIG_DEBUG_THREAD_INFO=y

# [forward-port] enable runtime stats so k_thread_runtime_stats_t has
# execution_cycles; auto-enabled by debug subsys in 3.2 Nuvoton fork
# but no longer cascading in upstream 3.7.1
CONFIG_SCHED_THREAD_USAGE=y
CONFIG_SCHED_THREAD_USAGE_ALL=y
CONFIG_SCHED_THREAD_USAGE_AUTO_ENABLE=y

# Zephyr kernel/driver configuration required by EC FW
# ----------------------------------------------------
#[AMD]++
CONFIG_WATCHDOG=n
#[AMD]--

# EC FW flows require to intercept host warnings
CONFIG_ESPI_AUTOMATIC_WARNING_ACKNOWLEDGE=n

# Enable IO expander support
#[AMD]++
CONFIG_GPIO_PCA95XX=n
#[AMD]--

# Required for SAF
CONFIG_ESPI_FLASH_CHANNEL=y

# SAF required drivers
CONFIG_SPI=y
# [spike] SAF_SPI_* gated by ESPI_SAF which is n on rts5918_bison; quiet for now
# CONFIG_SAF_SPI_CAPACITY=32
# CONFIG_SAF_SPI_FREQ_MHZ=8
CONFIG_SPI_ASYNC=n

# Kernel debug features
# ---------------------
CONFIG_THREAD_NAME=y
CONFIG_STACK_SENTINEL=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536

# [spike] tps6599x.c source missing in AMD release (only header exists);
# disabling here lets CMakeLists skip the dangling source reference
CONFIG_USBC_TIPD_TPS6599X=n

# [forward-port-scaffold] Feature-parity modules gated OFF until the
# Plum-on-RTS5918 schematic-driven pin map lands. Each entry below has
# a paired TODO(realtek-schematic) marker in the .h files under
# boards/realtek/rts5918_mdsplum/source/ describing what the schematic
# must supply before that module can be re-enabled.
#
# To re-enable a module: flip its line below to =y, then walk the
# corresponding stub .c (also under boards/realtek/.../source/) and
# replace each function body with the real Plum hardware sequence.
CONFIG_PLATFORM_INIT=n             # board_init.c: POR sequence + autogen GPIO table
CONFIG_BATTERY_MANAGEMENT=n        # board_smtbty.c: SBS over I2C_3 0x0B
CONFIG_IO_EXPANDER=n               # board_ioexp.c: PCA9535 x7 on I2C_1
CONFIG_SLEEP=n                     # board_sleep.c: RTS5918 wake controller + KSI
CONFIG_PERIPHERAL_MANAGEMENT=n     # board_periph.c: button/switch debounce
CONFIG_APP_THERMAL=n               # board_thermal.c: SB-TSI/TMP432/LM95234
CONFIG_VR_CONFIG_TABLE=n           # board_vrCfg.c: SVI3 VR table
CONFIG_SELECTABLE_DAC_VALUE=n      # board_dac.c: VR DAC reference
CONFIG_POWER_SOURCE_MANAGEMENT=n   # board_pwrSrc.c: AC/PD/Bty detect

# AMD CPU does not expose PECI on Plum; RTS5918 also has no PECI block.
# CPU temp routes through SB-TSI (drivers/dev_sbtsi.c) instead.
CONFIG_PECI=n

# Phase 2B-scaffold: enable THREAD_RUNTIME_STATS so SCHED_THREAD_USAGE
# above actually takes effect (the kernel Kconfig nests these).
CONFIG_THREAD_RUNTIME_STATS=y

# Wireless manageability + USB-C PD (TI 6699x) depend on Plum-specific
# pin defines (MPM_EVENT_N, TPS register-bank macros) that are not in
# the scaffold yet. Gate off until the corresponding TODO(realtek-
# schematic) entries in mdsplum_rts5918.h are filled.
CONFIG_WIRELESS_MANAGEABILITY=n
CONFIG_USBC_TIPD_TPS6699X=n

# UCSI tunnel calls TI-flavoured macros (TI_REG_READ/_WRITE) that come
# from the closed TPS6699x register-map header. With both TPS6599x and
# TPS6699x disabled the UCSI tunnel can't compile against TI at all;
# leave Realtek path enabled.
CONFIG_USBC_UCSI_TUNNEL=n

# PS/2 driver needs DT alias `ps2_keyboard`/`ps2_mouse` which the
# scaffold DTS does not provide. Keep off until the Plum PS/2 wiring
# is captured.
CONFIG_PS2_KEYBOARD=n
CONFIG_PS2_MOUSE=n

# ec_debug eSPI test paths touch NPCX register structs directly
# (struct espi_reg, NPCX_ESPICFG_*, NPCX_VWEVMS_*); not portable to
# RTS5918 silicon and not needed for first-light bring-up.
CONFIG_ECDBGI_SUPPORT=n
CONFIG_ECDBGI_ESPI_SLAVE_CAPABILITIES=n
CONFIG_ECDBGI_ESPI_PC_BUS_MASTER_TEST=n
CONFIG_ECDBGI_ESPI_VW_INFORMATION=n
CONFIG_ECDBGI_ESPI_OOB_TEST=n
CONFIG_ECDBGI_ESPI_FA_TEST=n

# Gate the whole USB-C 4CC/PD driver layer off so the TI-specific
# DRV_TPS_INT_EVENT typedef and other TPS6699x register macros don't
# need to resolve. UCSI tunnel, 4CC, CCGx, RTKPD also depend on
# board pin defines that are TODO until Plum I2C bus assignment lands.
CONFIG_USBC_4CC=n
CONFIG_USBC_CCGX=n
CONFIG_USBC_RTK=n
CONFIG_USBC_RTKPD=n
CONFIG_USBC_ITEPD=n
CONFIG_USBC_DRIVERS=n
CONFIG_USBC_POWER_DELIVERY=n

# smchost polling-loop branch uses a `period` symbol that only exists
# in older AMD checkouts. Event-driven mode bypasses that branch and is
# the correct path on RTS5918 (eSPI IBF wakes the smchost thread).
CONFIG_SMCHOST_EVENT_DRIVEN_TASK=y

# Picolibc + Zephyr lock retargeting mismatch on this toolchain.
# Switch to newlib which has stable Zephyr 3.7.1 integration.
CONFIG_PICOLIBC=n
CONFIG_NEWLIB_LIBC=y

# Zephyr lib/acpi (x86 MADT parsing helpers) gets pulled in by some
# default Kconfig dependency but is not needed for EC firmware.
CONFIG_ACPI=n
